[mypy]
python_version = 3.12
strict = True
ignore_missing_imports = True
exclude = (?x)(alembic/ | \.venv/ | __pycache__ | manage\.py)

; Third-party packages without stubs
[mypy-celery.*]
ignore_missing_imports = True

[mypy-fitz.*]
ignore_missing_imports = True

[mypy-mlflow.*]
ignore_missing_imports = True

[mypy-optuna.*]
ignore_missing_imports = True

[mypy-chromadb.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-xgboost.*]
ignore_missing_imports = True

[mypy-lightgbm.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-prefect.*]
ignore_missing_imports = True

[mypy-strawberry.*]
ignore_missing_imports = True
